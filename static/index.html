<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent UI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f13;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: #1a1a24;
    border-bottom: 1px solid #2a2a3a;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #c0c0d0; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  #conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
  }
  #conn-status.dot-ok { background: #1a2a1a; color: #6a6; }
  #conn-status.dot-err { background: #2a1a1a; color: #f66; }
  #conn-status .dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  #conn-status.dot-ok .dot { background: #4a4; }
  #conn-status.dot-err .dot { background: #f44; }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls label { font-size: 13px; color: #888; }
  .controls select, .controls input {
    background: #2a2a3a;
    color: #e0e0e0;
    border: 1px solid #3a3a4a;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }
  .controls select:focus, .controls input:focus { border-color: #5a5a7a; }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
  }
  .msg.user {
    align-self: flex-end;
    background: #2b3a5a;
    border-bottom-right-radius: 4px;
  }
  .msg.agent {
    align-self: flex-start;
    background: #1e1e2e;
    border-bottom-left-radius: 4px;
    position: relative;
  }
  .msg.agent:hover .copy-btn { opacity: 1; }
  .msg.agent .agent-label {
    font-size: 11px;
    color: #6a6a8a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .msg.agent .agent-label .agent-name { color: #8a8aff; }
  .copy-btn {
    opacity: 0;
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: opacity 0.2s, background 0.2s;
  }
  .copy-btn:hover { background: #3a3a4a; color: #ccc; }
  .copy-btn.copied { color: #6a6; }
  .msg-body { white-space: pre-wrap; word-wrap: break-word; }
  .msg.status {
    align-self: center;
    background: transparent;
    color: #666;
    font-size: 13px;
  }
  .msg.error {
    align-self: center;
    background: #3a1a1a;
    color: #ff6b6b;
    border: 1px solid #5a2a2a;
  }
  .msg.system {
    align-self: center;
    background: #1a1a2a;
    color: #8a8acc;
    font-size: 12px;
    font-family: monospace;
    border: 1px solid #2a2a4a;
    padding: 6px 14px;
    max-width: 100%;
  }
  .msg pre {
    background: #0a0a12;
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
  }
  .msg code {
    background: #0a0a12;
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 13px;
  }
  #input-area {
    padding: 16px 24px;
    background: #1a1a24;
    border-top: 1px solid #2a2a3a;
    display: flex;
    gap: 12px;
  }
  #input-area textarea {
    flex: 1;
    background: #2a2a3a;
    color: #e0e0e0;
    border: 1px solid #3a3a4a;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
  }
  #input-area textarea:focus { border-color: #5a5a7a; }
  #input-area button {
    background: #4a6aff;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  #input-area button:hover { background: #5a7aff; }
  #input-area button:disabled { background: #3a3a5a; cursor: not-allowed; }
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #555;
  }
  .welcome h2 { font-size: 24px; margin-bottom: 8px; color: #777; }
  .welcome p { font-size: 14px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 3px; }

  /* Spinner */
  .spinner {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .spinner .dots {
    display: inline-flex;
    gap: 4px;
  }
  .spinner .dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #666;
    animation: bounce 1.4s infinite both;
  }
  .spinner .dots span:nth-child(1) { animation-delay: 0s; }
  .spinner .dots span:nth-child(2) { animation-delay: 0.16s; }
  .spinner .dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Toast */
  #toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 400px;
  }
  .toast {
    background: #2a1a1a;
    border: 1px solid #5a2a2a;
    color: #ff6b6b;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.4;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: slideIn 0.3s ease;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .toast .icon { font-size: 18px; flex-shrink: 0; }
  .toast .close {
    cursor: pointer;
    color: #888;
    flex-shrink: 0;
    font-size: 16px;
    margin-left: auto;
    background: none;
    border: none;
    color: #666;
  }
  .toast .close:hover { color: #fff; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: #1a1a24;
    border: 1px solid #3a3a4a;
    border-radius: 14px;
    padding: 28px 32px;
    max-width: 460px;
    width: 90%;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  #modal h3 { font-size: 18px; margin-bottom: 12px; color: #ff6b6b; }
  #modal p { font-size: 14px; line-height: 1.5; color: #aaa; margin-bottom: 20px; }
  #modal input, #modal select {
    width: 100%;
    background: #2a2a3a;
    color: #e0e0e0;
    border: 1px solid #3a3a4a;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
  }
  #modal input:focus, #modal select:focus { border-color: #5a5a7a; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 14px;
    border: none;
    cursor: pointer;
  }
  .modal-btns .btn-primary { background: #4a6aff; color: white; }
  .modal-btns .btn-primary:hover { background: #5a7aff; }
  .modal-btns .btn-secondary { background: #3a3a4a; color: #ccc; }
  .modal-btns .btn-secondary:hover { background: #4a4a5a; }
  #send-btn.blocked {
    background: #5a3a3a;
    color: #888;
    cursor: not-allowed;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* Working dir badge */
  #working-dir {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888;
    padding: 4px 10px;
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    cursor: pointer;
    max-width: 260px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #working-dir:hover { border-color: #4a4a6a; }
  #working-dir .icon { flex-shrink: 0; font-size: 14px; }
  #working-dir .path { overflow: hidden; text-overflow: ellipsis; }
  #working-dir .clear {
    flex-shrink: 0;
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
  }
  #working-dir .clear:hover { color: #f66; }

  /* Folder picker */
  #folder-picker {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
    align-items: center;
    justify-content: center;
  }
  #folder-picker.show { display: flex; }
  #folder-picker .picker-panel {
    background: #1a1a24;
    border: 1px solid #3a3a4a;
    border-radius: 14px;
    width: 560px;
    max-width: 90vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  #folder-picker .picker-header {
    padding: 16px 20px;
    border-bottom: 1px solid #2a2a3a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #folder-picker .picker-header .current-path {
    flex: 1;
    font-size: 13px;
    color: #aaa;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: monospace;
  }
  #folder-picker .picker-header button {
    background: #3a3a4a;
    border: none;
    color: #ccc;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #folder-picker .picker-header button:hover { background: #4a4a5a; }
  #folder-picker .picker-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    min-height: 200px;
  }
  #folder-picker .picker-body .entry {
    padding: 8px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #ccc;
  }
  #folder-picker .picker-body .entry:hover { background: #2a2a3a; }
  #folder-picker .picker-body .entry .arrow { color: #666; font-size: 12px; }
  #folder-picker .picker-body .entry .folder-icon { margin-right: 6px; }
  #folder-picker .picker-footer {
    padding: 12px 20px;
    border-top: 1px solid #2a2a3a;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #folder-picker .picker-footer input {
    flex: 1;
    background: #2a2a3a;
    color: #e0e0e0;
    border: 1px solid #3a3a4a;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }
  #folder-picker .picker-footer input:focus { border-color: #5a5a7a; }
  #folder-picker .picker-footer .btn-sm {
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    border: none;
    cursor: pointer;
  }
  #folder-picker .picker-footer .btn-sm.primary { background: #4a6aff; color: white; }
  #folder-picker .picker-footer .btn-sm.primary:hover { background: #5a7aff; }
  #folder-picker .picker-footer .btn-sm.secondary { background: #3a3a4a; color: #ccc; }
  #folder-picker .picker-footer .btn-sm.secondary:hover { background: #4a4a5a; }
  #folder-picker .picker-footer .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
  #folder-picker .picker-loader {
    text-align: center;
    padding: 40px;
    color: #666;
  }

  /* Stats bar */
  #stats-bar {
    display: flex;
    gap: 16px;
    padding: 6px 24px;
    background: #12121a;
    border-top: 1px solid #2a2a3a;
    font-size: 11px;
    color: #555;
    font-variant-numeric: tabular-nums;
  }
  #stats-bar .stat {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #stats-bar .stat .val { color: #888; }
  #stats-bar .stat .val.high { color: #fa0; }
  #stats-bar .stat .val.crit { color: #f44; }
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="modal-overlay">
  <div id="modal">
    <h3>No model connected</h3>
    <p id="modal-msg">The backend could not connect to a model. Check the settings below or pull a model.</p>
    <select id="modal-backend" onchange="toggleModalModelInput()">
      <option value="ollama">Ollama</option>
      <option value="llamacpp">llama.cpp (GGUF file)</option>
    </select>
    <select id="modal-model-select"></select>
    <input type="text" id="modal-model-path" placeholder="/path/to/model.gguf" style="display:none">
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="retryConnection()">Retry</button>
    </div>
  </div>
</div>

<header>
  <h1>Agent UI</h1>
  <div class="header-right">
    <div id="conn-status" class="dot-err">
      <span class="dot"></span>
      <span id="conn-label">Checking...</span>
    </div>
    <div class="controls">
      <label>Backend</label>
      <select id="backend-select" onchange="onBackendChange(); checkConnection()">
        <option value="ollama">Ollama</option>
        <option value="llamacpp">llama.cpp</option>
      </select>
      <label>Agent</label>
      <select id="agent-select">
        <option value="">Auto</option>
        <option value="research">Research</option>
        <option value="code">Code</option>
        <option value="writer">Writer</option>
        <option value="project">Project</option>
      </select>
      <label>Model</label>
      <select id="model-select"></select>
      <input type="text" id="model-path" placeholder="/path/to/model.gguf" style="display:none;width:240px" />
    </div>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>Multi-Agent System</h2>
    <p>Enter a task to get started</p>
  </div>
</div>

<div id="input-area">
  <div id="working-dir" onclick="openFolderPicker()" title="Click to set working directory">
    <span class="icon">📁</span>
    <span class="path" id="wd-label">No folder selected</span>
    <button class="clear" id="wd-clear" onclick="event.stopPropagation(); clearWorkingDir()" style="display:none">✕</button>
  </div>
  <textarea id="task-input" rows="1" placeholder="Describe what you want to do..."></textarea>
  <button id="send-btn" onclick="send()">Send</button>
</div>

<div id="folder-picker">
  <div class="picker-panel">
    <div class="picker-header">
      <span class="current-path" id="fp-path">/</span>
      <button onclick="fpGoUp()">⬆ Up</button>
      <button onclick="fpGoHome()">🏠 Home</button>
      <button onclick="fpRefresh()">↻</button>
    </div>
    <div class="picker-body" id="fp-body">
      <div class="picker-loader">Loading...</div>
    </div>
    <div class="picker-footer">
      <input type="text" id="fp-new-folder" placeholder="New folder name..." onkeydown="if(event.key==='Enter') fpCreateFolder()">
      <button class="btn-sm primary" onclick="fpCreateFolder()">+ New</button>
      <button class="btn-sm secondary" onclick="closeFolderPicker()">Cancel</button>
      <button class="btn-sm primary" onclick="fpSelect()" id="fp-select-btn">Select</button>
    </div>
  </div>
</div>

<div id="stats-bar">
  <span class="stat">CPU: <span class="val" id="stat-cpu">0%</span></span>
  <span class="stat">RAM: <span class="val" id="stat-ram">0%</span></span>
  <span class="stat">Process: <span class="val" id="stat-proc-mem">0 MB</span></span>
  <span class="stat">Tokens: <span class="val" id="stat-tokens">0</span></span>
  <span class="stat">Agents: <span class="val" id="stat-agents">0</span></span>
  <span class="stat">Model: <span class="val" id="stat-loaded">idle</span></span>
  <span class="stat">Uptime: <span class="val" id="stat-uptime">0s</span></span>
  <span class="stat"><button onclick="shutdownServer()" style="background:none;border:1px solid #5a3a3a;color:#f66;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px">Shutdown</button></span>
</div>

<script>
let loading = false;
let connected = false;
let lastStats = null;
let workingDir = '';
let fpCurrentPath = '';

function formatBytes(mb) {
  if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
  return Math.round(mb) + ' MB';
}

function updateStats(stats) {
  if (!stats) return;
  lastStats = stats;
  const s = stats.system;
  const p = stats.process;
  const t = stats.tokens;

  document.getElementById('stat-cpu').textContent = s.cpu_percent.toFixed(1) + '%';
  const cpuEl = document.getElementById('stat-cpu');
  const cpuVal = s.cpu_percent;

  const ramEl = document.getElementById('stat-ram');
  ramEl.textContent = s.memory_percent.toFixed(1) + '%';
  ramEl.className = 'val' + (s.memory_percent > 80 ? ' crit' : s.memory_percent > 60 ? ' high' : '');

  document.getElementById('stat-proc-mem').textContent = formatBytes(p.memory_rss_mb);
  document.getElementById('stat-tokens').textContent = t.total.toLocaleString();
  const a = stats.agents;
  const agentLabels = Object.entries(a.by_agent).map(([n, c]) => `${n}:${c}`).join(' ');
  document.getElementById('stat-agents').textContent = a.total_calls + (agentLabels ? ' (' + agentLabels + ')' : '');
  document.getElementById('stat-loaded').textContent = stats.loaded ? 'connected' : 'idle';
  document.getElementById('stat-loaded').style.color = stats.loaded ? '#6a6' : '#888';
  document.getElementById('stat-uptime').textContent = stats.uptime_seconds + 's';
}

async function refreshStats() {
  try {
    const res = await fetch('/api/stats');
    if (res.ok) updateStats(await res.json());
  } catch { /* ignore */ }
}
setInterval(refreshStats, 3000);

function toast(msg, type) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="icon">${type === 'error' ? '\u26A0' : '\u2714'}</span><span>${msg}</span><button class="close" onclick="this.parentElement.remove()">\u2716</button>`;
  container.appendChild(el);
  setTimeout(() => { if (el.parentElement) el.remove(); }, 6000);
}

function showModal(msg) {
  document.getElementById('modal-msg').textContent = msg || 'The backend could not connect to a model.';
  document.getElementById('modal-backend').value = document.getElementById('backend-select').value;
  toggleModalModelInput();
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function toggleModalModelInput() {
  const be = document.getElementById('modal-backend').value;
  document.getElementById('modal-model-select').style.display = be === 'ollama' ? '' : 'none';
  document.getElementById('modal-model-path').style.display = be === 'llamacpp' ? '' : 'none';
}

function onBackendChange() {
  const be = document.getElementById('backend-select').value;
  document.getElementById('model-select').style.display = be === 'ollama' ? '' : 'none';
  document.getElementById('model-path').style.display = be === 'llamacpp' ? '' : 'none';
}

function updateConnStatus(ok, label) {
  const el = document.getElementById('conn-status');
  const lbl = document.getElementById('conn-label');
  el.className = ok ? 'dot-ok' : 'dot-err';
  lbl.textContent = label;
  connected = ok;
  const btn = document.getElementById('send-btn');
  if (!ok) {
    btn.classList.add('blocked');
    btn.title = 'No model connected';
  } else {
    btn.classList.remove('blocked');
    btn.title = '';
  }
}

async function checkConnection() {
  const backend = document.getElementById('backend-select').value;
  const model = backend === 'llamacpp'
    ? document.getElementById('model-path').value.trim()
    : document.getElementById('model-select').value;

  if (backend === 'llamacpp' && !model) {
    updateConnStatus(false, 'No GGUF file');
    return;
  }

  try {
    const res = await fetch('/api/check-model', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ backend, model }),
    });
    const data = await res.json();
    if (data.ok) {
      updateConnStatus(true, 'Connected');
      if (document.getElementById('modal-overlay').classList.contains('show')) {
        closeModal();
      }
    } else {
      updateConnStatus(false, 'Disconnected');
      showModal(data.error);
    }
  } catch {
    updateConnStatus(false, 'Server unreachable');
    showModal('Cannot reach the server.');
  }
}

async function retryConnection() {
  const backend = document.getElementById('modal-backend').value;
  const model = backend === 'llamacpp'
    ? document.getElementById('modal-model-path').value.trim()
    : document.getElementById('modal-model-select').value;

  document.getElementById('backend-select').value = backend;
  onBackendChange();
  if (backend === 'llamacpp') {
    document.getElementById('model-path').value = model;
  } else {
    document.getElementById('model-select').value = model;
  }
  await checkConnection();
}

async function loadModels() {
  try {
    const res = await fetch('/api/models');
    const models = await res.json();
    const sel = document.getElementById('model-select');
    const modalSel = document.getElementById('modal-model-select');
    const opts = models.map(m => `<option value="${m.name}">${m.name} (${m.size})</option>`).join('');
    sel.innerHTML = opts;
    modalSel.innerHTML = opts;
  } catch { /* ignore */ }
}

async function init() {
  await loadModels();
  onBackendChange();
  await checkConnection();
}
init();

function copyContent(btn, content) {
  navigator.clipboard.writeText(content).then(() => {
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function addMessage(role, content, agentName) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = `msg ${role}`;

  if (role === 'agent') {
    const label = document.createElement('div');
    label.className = 'agent-label';
    const nameSpan = document.createElement('span');
    nameSpan.innerHTML = agentName
      ? `Agent: <span class="agent-name">${agentName}</span>`
      : 'System';
    label.appendChild(nameSpan);

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => copyContent(copyBtn, content);
    label.appendChild(copyBtn);

    el.appendChild(label);
  }

  const body = document.createElement('div');
  body.className = 'msg-body';
  body.textContent = content;
  el.appendChild(body);

  chat.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
}

function makeSpinner(text) {
  const el = document.createElement('div');
  el.className = 'msg status';
  el.innerHTML = `<div class="spinner">${text}<span class="dots"><span></span><span></span><span></span></span></div>`;
  return el;
}

function updateWorkingDirUI() {
  const label = document.getElementById('wd-label');
  const clear = document.getElementById('wd-clear');
  if (workingDir) {
    label.textContent = workingDir;
    clear.style.display = '';
  } else {
    label.textContent = 'No folder selected';
    clear.style.display = 'none';
  }
}

function clearWorkingDir() {
  workingDir = '';
  updateWorkingDirUI();
}

async function openFolderPicker() {
  document.getElementById('folder-picker').classList.add('show');
  await fpBrowse('');
}

function closeFolderPicker() {
  document.getElementById('folder-picker').classList.remove('show');
}

async function fpBrowse(path) {
  const body = document.getElementById('fp-body');
  body.innerHTML = '<div class="picker-loader">Loading...</div>';
  const params = path ? `?path=${encodeURIComponent(path)}` : '';
  try {
    const res = await fetch(`/api/browse${params}`);
    const data = await res.json();
    fpCurrentPath = data.current;
    document.getElementById('fp-path').textContent = data.current;
    body.innerHTML = '';
    if (data.parent) {
      const up = document.createElement('div');
      up.className = 'entry';
      up.innerHTML = '<span class="arrow">⬆</span> ..';
      up.onclick = () => fpBrowse(data.parent);
      body.appendChild(up);
    }
    for (const e of data.entries) {
      const el = document.createElement('div');
      el.className = 'entry';
      el.innerHTML = `<span class="folder-icon">📁</span>${e.name}`;
      el.onclick = () => fpBrowse(e.path);
      body.appendChild(el);
    }
    if (data.entries.length === 0 && !data.parent) {
      body.innerHTML = '<div class="picker-loader">(empty)</div>';
    }
  } catch {
    body.innerHTML = '<div class="picker-loader" style="color:#f66">Failed to load</div>';
  }
}

function fpGoUp() {
  if (!fpCurrentPath) return;
  const p = fpCurrentPath.split('/').filter(Boolean);
  p.pop();
  const parent = p.length ? '/' + p.join('/') : '/';
  fpBrowse(parent);
}

function fpGoHome() {
  fpBrowse('');
}

function fpRefresh() {
  fpBrowse(fpCurrentPath);
}

async function fpCreateFolder() {
  const input = document.getElementById('fp-new-folder');
  const name = input.value.trim();
  if (!name) return;
  const newPath = fpCurrentPath + '/' + name;
  try {
    const res = await fetch('/api/browse/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: newPath }),
    });
    const data = await res.json();
    if (data.ok) {
      input.value = '';
      await fpBrowse(fpCurrentPath);
    } else {
      alert(data.error || 'Failed to create folder');
    }
  } catch {
    alert('Failed to create folder');
  }
}

function fpSelect() {
  workingDir = fpCurrentPath;
  updateWorkingDirUI();
  closeFolderPicker();
}

async function shutdownServer() {
  if (!confirm('Shut down the server? All tabs will lose connection.')) return;
  try {
    await fetch('/api/shutdown', { method: 'POST' });
    toast('Server shutting down...', 'error');
    document.getElementById('send-btn').disabled = true;
  } catch { /* server is gone */ }
}

async function send() {
  if (loading) return;
  if (!connected) {
    toast('No model connected. Check the connection status.', 'error');
    return;
  }
  const input = document.getElementById('task-input');
  const task = input.value.trim();
  if (!task) return;

  const backend = document.getElementById('backend-select').value;
  const agent = document.getElementById('agent-select').value;
  const model = backend === 'llamacpp'
    ? document.getElementById('model-path').value.trim()
    : document.getElementById('model-select').value;

  addMessage('user', task);
  input.value = '';
  input.style.height = 'auto';

  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  loading = true;

  const statusEl = makeSpinner('Thinking');
  document.getElementById('chat').appendChild(statusEl);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, agent: agent || undefined, model, backend, working_dir: workingDir || undefined }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.type === 'status') {
          statusEl.innerHTML = `<div class="spinner">${data.content}<span class="dots"><span></span><span></span><span></span></span></div>`;
        } else if (data.type === 'step') {
          if (data.type2 === 'tool_call') {
            const params = JSON.stringify(data.params || {});
            addMessage('system', `⚡ ${data.tool}(${params})`);
          } else if (data.type2 === 'tool_result') {
            const lines = (data.result || '').split('\n').filter(Boolean);
            const preview = lines.length > 2 ? lines.slice(0, 2).join('\n') + '...' : (data.result || '');
            addMessage('system', `✅ ${data.tool} → ${preview}`);
          }
        } else if (data.type === 'done') {
          statusEl.remove();
          addMessage('agent', data.content);
          if (data.stats) updateStats(data.stats);
        } else if (data.type === 'error') {
          statusEl.remove();
          addMessage('error', 'Error: ' + data.content);
          toast(data.content, 'error');
        }
      }
    }
  } catch (err) {
    statusEl.remove();
    addMessage('error', 'Connection error: ' + err.message);
    toast('Connection lost: ' + err.message, 'error');
  }

  sendBtn.disabled = false;
  loading = false;
}

window.addEventListener('beforeunload', () => {
  navigator.sendBeacon('/api/unload', '{}');
});

const textarea = document.getElementById('task-input');
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = textarea.scrollHeight + 'px';
});
</script>
</body>
</html>
